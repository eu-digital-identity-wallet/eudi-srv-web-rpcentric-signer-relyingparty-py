{% extends 'base.html' %} {% block content %}
<div class="page-centered blue-box">
  <h1>Available Certificate</h1>
  <div id="response">
    {% for credential_id in credentials %}
    <div style="cursor: pointer; padding: 5px; margin: 5px 0px; border: 1px solid #ccc; border-radius: 4px; background-color: #f9f9f9 " onclick="onClick('{{ credential_id }}')">
      {{ credential_id }}
    </div>
    {% endfor %}
  </div>
</div>
<script>
  function onClick(credential_id) {
    fetch("{{redirect_url}}/set_credential_id", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ credentialID: credential_id }),
    })
    .then((response) => {
      console.log(response);
      window.location.href = "{{redirect_url}}/check_options";
    })
    .catch((error) => {
      console.error("Error:", error);
    });
  }
</script>
{% endblock %}
