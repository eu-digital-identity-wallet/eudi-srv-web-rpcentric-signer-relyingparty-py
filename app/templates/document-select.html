{% extends 'base.html' %} {% block content %}
<div class="page-centered blue-box">
  <h1>Sign Document</h1>
  <h2>Select Document</h2>

  <p>Please select one of the example documents</p>

  <div class="button-container">
    <button class="btn common-btn secondary-btn" style="font-size: 10px;" onclick="setDocument('pdf')">
      PDF Document
    </button>
    <button class="btn common-btn secondary-btn" style="font-size: 10px;" onclick="setDocument('json')">
      JSON Document
    </button>
    <button class="btn common-btn secondary-btn" style="font-size: 10px;" onclick="setDocument('xml')">
      XML Document
    </button>
    <button class="btn common-btn secondary-btn" style="font-size: 10px;" onclick="setDocument('txt')">
      TXT Document
    </button>
  </div>

  <div class="preview" id="previewArea" hidden></div>

  <!--Button to Continue-->
  <button class="btn primary-btn" onclick="continueAction()">
    Continue
  </button>
</div>

<script>
  let selectedDocument = "";

  // Function to set the selected document type
  function setDocument(type) {
    selectedDocument = type;
    showPreview(type);
  }

  // Function to show the document preview based on selection
  function showPreview(type) {
    const previewArea = document.getElementById("previewArea");
    previewArea.hidden = false;

    // Clear preview area
    previewArea.innerHTML = "";

    if (type === "pdf") {
      // Show PDF document
      const pdfEmbed = document.createElement("embed");
      pdfEmbed.src = "/docs/sample.pdf"; // Path to the PDF
      pdfEmbed.type = "application/pdf";
      pdfEmbed.width = "100%";
      pdfEmbed.height = "500px";
      previewArea.appendChild(pdfEmbed);
    } else if (type === "json") {
      fetch("/docs/sample.json")
        .then((response) => response.json())
        .then((data) => {
          previewArea.textContent = JSON.stringify(data, null, 4);
        });
    } else if (type === "txt") {
      fetch("/docs/sample.txt")
        .then((response) => response.text())
        .then((data) => {
          previewArea.textContent = data;
        });
    } else if (type === "xml") {
      fetch("/docs/sample.xml")
        .then((response) => response.text())
        .then((data) => {
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(data, "application/xml");
          const xmlString = new XMLSerializer().serializeToString(xmlDoc);
          previewArea.textContent = xmlString; // Display XML as text
        });
    }
  }

  // Function to handle the "Continue" button
  function continueAction() {
    if (selectedDocument === "") {
      alert("Please select a document before continuing.");
      return;
    }
    window.location.href = `/tester/certificate/options?document=${selectedDocument}`;
  }
</script>

{% endblock %}
